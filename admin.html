<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAC Admin Panel - Secure</title>
  
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
    style-src 'self' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    connect-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
  ">
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#0c1220; --navy-2:#141e30; --navy-3:#1e2d44;
      --saffron:#f0a500; --seafoam:#3abf9e; --coral:#e85d3a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--navy);
      color: #e8eef6;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }
    
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: var(--navy-2);
      border: 2px solid rgba(240,165,0,0.18);
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      color: var(--saffron);
      text-align: center;
      margin-bottom: 30px;
    }
    .login-input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background: var(--navy);
      border: 1px solid #243450;
      border-radius: 6px;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--saffron);
      color: var(--navy);
      border: none;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      cursor: pointer;
    }
    .login-error {
      color: var(--coral);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      margin-bottom: 15px;
      display: none;
    }
    .rate-limit {
      color: var(--coral);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      margin-bottom: 15px;
      display: none;
    }
    
    .admin-container {
      display: none;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .admin-header {
      background: var(--navy-2);
      border-bottom: 1px solid rgba(240,165,0,0.18);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--navy-2);
      border: 1px solid rgba(240,165,0,0.18);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .stat-number {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      color: var(--saffron);
    }
    .unlock-card {
      background: var(--navy-2);
      border: 2px solid var(--seafoam);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
    }
    .unlock-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .unlock-input {
      flex: 1;
      padding: 10px;
      background: var(--navy);
      border: 1px solid #243450;
      border-radius: 6px;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
    }
    .unlock-btn {
      padding: 10px 20px;
      background: var(--seafoam);
      color: var(--navy);
      border: none;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--navy-2);
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #243450;
    }
    th { background: var(--navy-3); }
    .badge {
      padding: 3px 8px;
      border-radius: 100px;
      font-size: 0.7rem;
    }
    .badge-used { background: rgba(232,93,58,0.15); color: var(--coral); }
    .badge-unused { background: rgba(58,191,158,0.15); color: var(--seafoam); }
    .logout-btn {
      background: transparent;
      border: 1px solid var(--coral);
      color: var(--coral);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="login-container" id="login-container">
  <div class="login-card">
    <div class="login-title">DAC ADMIN</div>
    <div class="rate-limit" id="rate-limit"></div>
    <div class="login-error" id="login-error"></div>
    <input type="email" class="login-input" id="email" placeholder="Email" autocomplete="off">
    <input type="password" class="login-input" id="password" placeholder="Password" autocomplete="off">
    <button class="login-btn" onclick="doLogin()">LOGIN</button>
  </div>
</div>

<div class="admin-container" id="admin-container">
  <div class="admin-header">
    <span style="font-family:'Syne',sans-serif;color:var(--saffron)">DAC Admin</span>
    <div>
      <span id="admin-email" style="margin-right:15px;"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-number" id="stat-total">0</div><div>Total</div></div>
    <div class="stat-card"><div class="stat-number" id="stat-unused">0</div><div>Unused</div></div>
    <div class="stat-card"><div class="stat-number" id="stat-used">0</div><div>Used</div></div>
    <div class="stat-card"><div class="stat-number" id="stat-today">0</div><div>Today</div></div>
  </div>

  <div class="unlock-card">
    <h3 style="color:var(--seafoam);margin-bottom:15px;">🖨️ Admin Free Print</h3>
    <div class="unlock-row">
      <input type="text" class="unlock-input" id="unlock-code" placeholder="GD-STG-XXXXXX">
      <select id="unlock-product" style="padding:10px;background:var(--navy);color:#fff;border:1px solid #243450;border-radius:6px;">
        <option value="sticker">Sticker</option>
        <option value="layout">Layout</option>
      </select>
      <button class="unlock-btn" onclick="adminUnlock()">Generate Token</button>
    </div>
    <div id="unlock-msg" style="margin-top:10px;font-family:monospace;"></div>
  </div>

  <table>
    <thead><tr><th>Code</th><th>Product</th><th>Status</th><th>Created</th></tr></thead>
    <tbody id="orders-body"></tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
  'use strict';
  
  const SUPABASE_URL = 'https://duoggvkkvyvicpfoawuv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1b2dndmtrdnl2aWNwZm9hd3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDczODAsImV4cCI6MjA4ODIyMzM4MH0.7dnVEQqH0LU_qOVeM2q7wE1gL14frD-s981vw0QpBZU';
  
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
  let loginAttempts = 0;
  let lockedUntil = 0;
  const MAX_ATTEMPTS = 5;
  const LOCKOUT_TIME = 15 * 60 * 1000;
  
  supabase.auth.getSession().then(result => {
    if (result.data?.session) {
      showAdmin(result.data.session.user.email);
    }
  });
  
  window.doLogin = async function() {
    const now = Date.now();
    if (lockedUntil > now) {
      const mins = Math.ceil((lockedUntil - now) / 60000);
      document.getElementById('rate-limit').textContent = `Try again in ${mins} minutes`;
      document.getElementById('rate-limit').style.display = 'block';
      return;
    }
    
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    
    const result = await supabase.auth.signInWithPassword({ email, password: pass });
    
    if (result.error) {
      loginAttempts++;
      if (loginAttempts >= MAX_ATTEMPTS) {
        lockedUntil = now + LOCKOUT_TIME;
        document.getElementById('rate-limit').textContent = 'Too many attempts. Try again in 15 minutes.';
        document.getElementById('rate-limit').style.display = 'block';
      }
      document.getElementById('login-error').textContent = '❌ Invalid credentials';
      document.getElementById('login-error').style.display = 'block';
    } else {
      loginAttempts = 0;
      showAdmin(result.data.user.email);
    }
  };
  
  window.doLogout = async function() {
    await supabase.auth.signOut();
    document.getElementById('admin-container').style.display = 'none';
    document.getElementById('login-container').style.display = 'flex';
  };
  
  function showAdmin(email) {
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('admin-container').style.display = 'block';
    document.getElementById('admin-email').textContent = email;
    loadStats();
    loadOrders();
  }
  
  async function sbFetch(path, opts = {}) {
    const session = await supabase.auth.getSession();
    const token = session.data?.session?.access_token;
    
    return fetch(SUPABASE_URL + path, {
      ...opts,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + (token || SUPABASE_KEY),
        'Content-Type': 'application/json',
        ...opts.headers
      }
    });
  }
  
  function generateToken() {
    const arr = new Uint8Array(32);
    crypto.getRandomValues(arr);
    return 'admin_' + Array.from(arr, b => b.toString(16).padStart(2,'0')).join('');
  }
  
  window.loadStats = function() {
    sbFetch('/rest/v1/dac_payments?select=id,used,created_at')
    .then(r => r.json())
    .then(rows => {
      if (!Array.isArray(rows)) return;
      const today = new Date().toISOString().slice(0,10);
      document.getElementById('stat-total').textContent = rows.length;
      document.getElementById('stat-unused').textContent = rows.filter(r => !r.used).length;
      document.getElementById('stat-used').textContent = rows.filter(r => r.used).length;
      document.getElementById('stat-today').textContent = rows.filter(r => r.created_at?.slice(0,10) === today).length;
    });
  };
  
  window.loadOrders = function() {
    sbFetch('/rest/v1/dac_payments?select=*&order=created_at.desc&limit=50')
    .then(r => r.json())
    .then(rows => {
      if (!Array.isArray(rows)) return;
      document.getElementById('orders-body').innerHTML = rows.map(row => `
        <tr>
          <td style="color:var(--saffron)">${row.dac_code || '—'}</td>
          <td>${row.product || 'sticker'}</td>
          <td><span class="badge ${row.used ? 'badge-used' : 'badge-unused'}">${row.used ? 'Used' : 'Ready'}</span></td>
          <td>${row.created_at ? new Date(row.created_at).toLocaleString() : '—'}</td>
        </tr>
      `).join('');
    });
  };
  
  window.adminUnlock = function() {
    const code = document.getElementById('unlock-code').value.trim().toUpperCase();
    const product = document.getElementById('unlock-product').value;
    const msgEl = document.getElementById('unlock-msg');
    
    if (!code) {
      msgEl.textContent = '⚠ Enter a code';
      return;
    }
    
    const token = generateToken();
    
    sbFetch('/rest/v1/dac_payments', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        dac_code: code,
        token: token,
        product: product,
        used: false,
        created_at: new Date().toISOString()
      })
    })
    .then(r => {
      if (r.ok) {
        msgEl.innerHTML = `✅ Token created! <a href="${product}.html?token=${token}" target="_blank" style="color:var(--saffron)">Print →</a>`;
        document.getElementById('unlock-code').value = '';
        loadOrders();
      } else {
        msgEl.textContent = '⚠ Failed to create token';
      }
    })
    .catch(() => msgEl.textContent = '⚠ Error');
  };
})();
</script>
</body>
</html>
