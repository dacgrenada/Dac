<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAC Admin Panel - Secure</title>
  
  <!-- STRICT Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
    style-src 'self' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src * data:;
    connect-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
    frame-src 'none';
    object-src 'none';
    base-uri 'self';
  ">
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:#0c1220; --navy-2:#141e30; --navy-3:#1e2d44; --navy-4:#243450;
      --saffron:#f0a500; --saffron-2:#ffbe33; --seafoam:#3abf9e;
      --coral:#e85d3a; --purple:#9b72e8;
      --text:#e8eef6; --dim:#7a92b4; --border:rgba(240,165,0,0.18);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--navy);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;position:relative;}
    
    /* Permanent watermark */
    body::after {
      content: "🔒 SECURE ADMIN · " attr(data-timestamp);
      position: fixed;
      bottom: 5px;
      left: 5px;
      font-size: 9px;
      color: rgba(240,165,0,0.2);
      font-family: monospace;
      pointer-events: none;
      z-index: 999999;
    }

    /* ── Login Screen ── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .login-card {
      background: var(--navy-2); border: 2px solid var(--border);
      border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6); text-align: center;
    }
    .login-logo { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; color: var(--saffron); }
    .login-sub  { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--dim); margin-bottom: 2rem; margin-top: 4px; }
    .login-label { text-align: left; font-size: 0.75rem; color: var(--dim); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .login-input {
      width: 100%; padding: 0.75rem 1rem; border-radius: 8px;
      border: 1px solid var(--navy-4); background: var(--navy);
      color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 1rem;
      outline: none; margin-bottom: 1.2rem; letter-spacing: 0.08em;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--saffron); }
    
    /* Rate limit warning */
    .rate-limit-warning {
      background: rgba(232,93,58,0.12); border: 1px solid rgba(232,93,58,0.4);
      color: var(--coral); border-radius: 8px; padding: 0.6rem 1rem;
      font-size: 0.82rem; margin-bottom: 1rem; display: none;
      font-family: 'IBM Plex Mono', monospace;
    }
    
    .btn-login {
      width: 100%; padding: 0.85rem; border-radius: 8px;
      background: var(--saffron); color: var(--navy);
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
      border: none; cursor: pointer; letter-spacing: 0.04em;
      transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover:not(:disabled) { background: var(--saffron-2); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      background: rgba(232,93,58,0.12); border: 1px solid rgba(232,93,58,0.4);
      color: var(--coral); border-radius: 8px; padding: 0.6rem 1rem;
      font-size: 0.82rem; margin-bottom: 1rem; display: none;
      font-family: 'IBM Plex Mono', monospace;
    }
    .login-spinner {
      width: 16px; height: 16px; border: 2px solid var(--navy);
      border-top-color: transparent; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Admin Dashboard ── */
    #admin-screen { display: none; }

    .admin-header {
      background: var(--navy-2); border-bottom: 1px solid var(--border);
      padding: 0 1.5rem; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-logo { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--saffron); }
    .admin-badge { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; background: var(--saffron); color: var(--navy); padding: 3px 10px; border-radius: 100px; font-weight: 700; }
    .admin-email { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--dim); }
    .btn-logout { background: transparent; border: 1px solid var(--coral); color: var(--coral); padding: 6px 14px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; font-family: 'IBM Plex Mono', monospace; }

    .admin-body { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: var(--navy-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.2rem; text-align: center;
    }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--saffron); }
    .stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); margin-top: 4px; }

    /* Free unlock */
    .unlock-card {
      background: var(--navy-2); border: 2px solid var(--seafoam);
      border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .unlock-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--seafoam); margin-bottom: 0.75rem; }
    .unlock-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .unlock-input {
      flex: 1; min-width: 220px; padding: 0.65rem 0.9rem; border-radius: 8px;
      border: 1px solid var(--navy-4); background: var(--navy);
      color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s; text-transform: uppercase;
    }
    .unlock-input:focus { border-color: var(--seafoam); }
    .btn-unlock {
      padding: 0.65rem 1.4rem; border-radius: 8px;
      background: var(--seafoam); color: var(--navy);
      font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 800;
      border: none; cursor: pointer; white-space: nowrap;
    }
    .btn-unlock:hover { opacity: 0.9; }
    .unlock-msg { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; margin-top: 0.6rem; }
    .unlock-msg.success { color: var(--seafoam); }
    .unlock-msg.error   { color: var(--coral); }

    /* Orders table */
    .orders-card {
      background: var(--navy-2); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .orders-header {
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .orders-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); }
    .btn-refresh {
      background: transparent; border: 1px solid var(--navy-4); color: var(--dim);
      padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer;
      font-family: 'IBM Plex Mono', monospace; transition: border-color 0.2s;
    }
    .btn-refresh:hover { border-color: var(--saffron); color: var(--saffron); }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 0.7rem 1.2rem;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim);
      border-bottom: 1px solid var(--border); background: var(--navy-3);
    }
    td {
      padding: 0.75rem 1.2rem;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--navy-3); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 100px;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
    }
    .badge-used     { background: rgba(232,93,58,0.15); color: var(--coral); border: 1px solid rgba(232,93,58,0.3); }
    .badge-unused   { background: rgba(58,191,158,0.15); color: var(--seafoam); border: 1px solid rgba(58,191,158,0.3); }
    .badge-admin    { background: rgba(155,114,232,0.15); color: var(--purple); border: 1px solid rgba(155,114,232,0.3); }
    .badge-sticker  { background: rgba(240,165,0,0.12); color: var(--saffron); border: 1px solid rgba(240,165,0,0.3); }
    .empty-row td { text-align: center; color: var(--dim); padding: 2rem; }
  </style>
</head>
<body data-timestamp="">

<!-- ── Login Screen ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🇬🇩 DAC</div>
    <div class="login-sub">Admin Panel · Secure Access</div>
    <div class="rate-limit-warning" id="rate-limit-warning"></div>
    <div class="login-error" id="login-error"></div>
    <div class="login-label">Email</div>
    <input type="email" class="login-input" id="admin-email" placeholder="admin@dac.gd" autocomplete="off"/>
    <div class="login-label">Password</div>
    <input type="password" class="login-input" id="admin-pass" placeholder="Enter secure password" autocomplete="off"/>
    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <div class="login-spinner" id="login-spinner"></div>
      <span id="login-label">🔐 Secure Login</span>
    </button>
  </div>
</div>

<!-- ── Admin Dashboard ── -->
<div id="admin-screen">
  <div class="admin-header">
    <div>
      <span class="admin-logo">DAC Admin</span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span class="admin-email" id="admin-email-display"></span>
      <span class="admin-badge">✅ ADMIN</span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="admin-body">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Total Payments</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-unused">—</div>
        <div class="stat-label">Unused Tokens</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-printed">—</div>
        <div class="stat-label">Tokens Used</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-today">—</div>
        <div class="stat-label">Today</div>
      </div>
    </div>

    <!-- Admin Unlock -->
    <div class="unlock-card">
      <div class="unlock-title">🖨️ Admin Free Print</div>
      <p style="font-size:0.82rem;color:var(--dim);margin-bottom:1rem;">Generate a free admin token (audit logged)</p>
      <div class="unlock-row">
        <input type="text" class="unlock-input" id="unlock-code" placeholder="GD-STG-XXXXXX" maxlength="20"/>
        <select id="unlock-product" style="padding:0.65rem 0.9rem;border-radius:8px;border:1px solid var(--navy-4);background:var(--navy);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:0.85rem;outline:none;">
          <option value="sticker">Sticker</option>
          <option value="layout">Layout</option>
        </select>
        <button class="btn-unlock" onclick="adminUnlock()">Generate Token →</button>
      </div>
      <div class="unlock-msg" id="unlock-msg"></div>
    </div>

    <!-- Orders Table -->
    <div class="orders-card">
      <div class="orders-header">
        <span class="orders-title">📋 Payment Records</span>
        <button class="btn-refresh" onclick="loadOrders()">↻ Refresh</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>DAC Code</th>
            <th>Product</th>
            <th>Token</th>
            <th>Status</th>
            <th>Created</th>
            <th>Used At</th>
          </tr>
        </thead>
        <tbody id="orders-body">
          <tr class="empty-row"><td colspan="6">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function() {
  'use strict';

  // =============================================
  // SECURE CONFIGURATION
  // =============================================
  const SUPABASE_URL = 'https://duoggvkkvyvicpfoawuv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1b2dndmtrdnl2aWNwZm9hd3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDczODAsImV4cCI6MjA4ODIyMzM4MH0.7dnVEQqH0LU_qOVeM2q7wE1gL14frD-s981vw0QpBZU';
  
  // Set timestamp for watermark
  document.body.setAttribute('data-timestamp', new Date().toISOString());

  // =============================================
  // RATE LIMITING (CLIENT-SIDE ENFORCEMENT)
  // =============================================
  let loginAttempts = 0;
  let lockedUntil = 0;
  const MAX_ATTEMPTS = 5;
  const LOCKOUT_TIME = 15 * 60 * 1000; // 15 minutes

  // =============================================
  // INIT SUPABASE CLIENT
  // =============================================
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Check for existing session
  supabase.auth.getSession().then(function(result) {
    const session = result.data && result.data.session;
    if (session && session.user) {
      // Log admin access
      fetch(`${SUPABASE_URL}/rest/v1/rpc/log_admin_access`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ 
          email: session.user.email,
          action: 'login'
        })
      }).catch(() => {});
      
      showAdmin(session.user.email);
    }
  });

  // =============================================
  // SECURE LOGIN WITH RATE LIMITING
  // =============================================
  window.doLogin = async function() {
    const now = Date.now();
    
    // Check if locked out
    if (lockedUntil > now) {
      const minutesLeft = Math.ceil((lockedUntil - now) / 60000);
      document.getElementById('rate-limit-warning').textContent = 
        `Too many failed attempts. Try again in ${minutesLeft} minutes.`;
      document.getElementById('rate-limit-warning').style.display = 'block';
      return;
    }

    const email = document.getElementById('admin-email').value.trim();
    const pass = document.getElementById('admin-pass').value;
    const errEl = document.getElementById('login-error');
    const rateWarning = document.getElementById('rate-limit-warning');

    rateWarning.style.display = 'none';
    errEl.style.display = 'none';

    if (!email || !pass) {
      errEl.textContent = 'Please enter your email and password.';
      errEl.style.display = 'block';
      return;
    }

    // Show spinner
    document.getElementById('btn-login').disabled = true;
    document.getElementById('login-spinner').style.display = 'inline-block';
    document.getElementById('login-label').textContent = 'Verifying…';

    // Attempt login
    const result = await supabase.auth.signInWithPassword({ 
      email: email, 
      password: pass 
    });

    // Hide spinner
    document.getElementById('btn-login').disabled = false;
    document.getElementById('login-spinner').style.display = 'none';
    document.getElementById('login-label').textContent = '🔐 Secure Login';

    if (result.error) {
      // Failed attempt - increment counter
      loginAttempts++;
      
      // Check if should lock out
      if (loginAttempts >= MAX_ATTEMPTS) {
        lockedUntil = now + LOCKOUT_TIME;
        rateWarning.textContent = `Too many failed attempts. Try again in 15 minutes.`;
        rateWarning.style.display = 'block';
        loginAttempts = 0;
      }
      
      errEl.textContent = '❌ Invalid credentials';
      errEl.style.display = 'block';
      document.getElementById('admin-pass').value = '';
      
      // Log failed attempt
      fetch(`${SUPABASE_URL}/rest/v1/rpc/log_failed_login`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email: email })
      }).catch(() => {});
      
      return;
    }

    // Success - reset counters
    loginAttempts = 0;
    lockedUntil = 0;
    
    // Log successful login
    fetch(`${SUPABASE_URL}/rest/v1/rpc/log_admin_access`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ 
        email: email,
        action: 'login_success'
      })
    }).catch(() => {});

    showAdmin(result.data.user.email);
  };

  // =============================================
  // SECURE LOGOUT
  // =============================================
  window.doLogout = async function() {
    const email = document.getElementById('admin-email-display').textContent;
    
    // Log logout
    fetch(`${SUPABASE_URL}/rest/v1/rpc/log_admin_access`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ 
        email: email,
        action: 'logout'
      })
    }).catch(() => {});

    await supabase.auth.signOut();
    
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-email').value = '';
    document.getElementById('admin-pass').value = '';
  };

  // =============================================
  // SHOW ADMIN PANEL
  // =============================================
  function showAdmin(email) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    document.getElementById('admin-email-display').textContent = email || '';
    loadStats();
    loadOrders();
  }

  // =============================================
  // SECURE FETCH WITH AUTH
  // =============================================
  async function sbFetch(path, opts = {}) {
    const sessionResult = await supabase.auth.getSession();
    const token = sessionResult.data?.session?.access_token;

    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (token || SUPABASE_KEY),
      'Content-Type': 'application/json'
    };

    return fetch(SUPABASE_URL + path, {
      ...opts,
      headers: { ...headers, ...(opts.headers || {}) }
    });
  }

  // =============================================
  // GENERATE SECURE TOKEN
  // =============================================
  function generateToken() {
    const arr = new Uint8Array(32);
    crypto.getRandomValues(arr);
    return 'admin_' + Array.from(arr, b => b.toString(16).padStart(2,'0')).join('');
  }

  // =============================================
  // LOAD STATS (VIA VIEW)
  // =============================================
  window.loadStats = function() {
    sbFetch('/rest/v1/admin_stats')
    .then(r => r.json())
    .then(stats => {
      if (!stats || stats.length === 0) return;
      const s = stats[0];
      document.getElementById('stat-total').textContent = s.total_payments || '0';
      document.getElementById('stat-unused').textContent = s.pending_payments || '0';
      document.getElementById('stat-printed').textContent = s.completed_payments || '0';
      document.getElementById('stat-today').textContent = s.last_24h || '0';
    })
    .catch(e => console.error('Stats error:', e));
  };

  // =============================================
  // LOAD ORDERS (VIA VIEW)
  // =============================================
  window.loadOrders = function() {
    const tbody = document.getElementById('orders-body');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Loading…</td></tr>';
    
    sbFetch('/rest/v1/admin_payments?order=created_at.desc&limit=100')
    .then(r => r.json())
    .then(rows => {
      if (!Array.isArray(rows) || rows.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No records yet.</td></tr>';
        return;
      }
      
      tbody.innerHTML = rows.map(row => {
        const statusBadge = row.used
          ? '<span class="badge badge-used">Used</span>'
          : '<span class="badge badge-unused">Ready</span>';
        
        return '<tr>' +
          '<td style="color:var(--saffron);font-weight:600;">' + (row.dac_code || '—') + '</td>' +
          '<td><span class="badge badge-sticker">' + (row.product_type || 'sticker') + '</span></td>' +
          '<td style="color:var(--dim);">••••••••</td>' +  // Hide full tokens
          '<td>' + statusBadge + '</td>' +
          '<td style="color:var(--dim);">' + (row.created_at ? new Date(row.created_at).toLocaleString() : '—') + '</td>' +
          '<td style="color:var(--dim);">' + (row.used_at ? new Date(row.used_at).toLocaleString() : '—') + '</td>' +
          '</tr>';
      }).join('');
      
      loadStats();
    })
    .catch(e => {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6" style="color:var(--coral);">Error loading records</td></tr>';
    });
  };

  // =============================================
  // ADMIN UNLOCK (AUDIT LOGGED)
  // =============================================
  window.adminUnlock = function() {
    const codeInput = document.getElementById('unlock-code');
    const product = document.getElementById('unlock-product').value;
    const code = codeInput.value.trim().toUpperCase();
    const msgEl = document.getElementById('unlock-msg');

    if (!code || code.length < 6) {
      msgEl.className = 'unlock-msg error';
      msgEl.textContent = '⚠ Please enter a valid DAC code.';
      return;
    }

    msgEl.className = 'unlock-msg';
    msgEl.textContent = '⏳ Generating admin token…';

    const token = generateToken();

    // Call edge function instead of direct insert
    fetch(`${SUPABASE_URL}/functions/v1/admin-create-token`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        dac_code: code,
        token: token,
        product: product
      })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        msgEl.className = 'unlock-msg success';
        const targetPage = product === 'sticker' ? 'sticker.html' : 'layout.html';
        const printUrl = targetPage + '?token=' + encodeURIComponent(token);
        msgEl.innerHTML = '✅ Token created! <a href="' + printUrl + '" target="_blank" style="color:var(--saffron);text-decoration:underline;">Click here to print →</a>';
        codeInput.value = '';
        loadOrders();
      } else {
        msgEl.className = 'unlock-msg error';
        msgEl.textContent = '⚠ ' + (data.error || 'Failed to create token');
      }
    })
    .catch(e => {
      msgEl.className = 'unlock-msg error';
      msgEl.textContent = '⚠ Error: ' + e.message;
    });
  };

  // =============================================
  // TAMPER PROTECTION
  // =============================================
  setInterval(function() {
    if (!document.body.hasAttribute('data-timestamp')) {
      location.reload();
    }
  }, 5000);

})();
</script>
</body>
</html>
