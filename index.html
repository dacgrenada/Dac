<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAC – Digital Address Codes</title>
  <link rel="stylesheet" href="style.css" />
  
  <!-- STRICT SECURITY HEADERS -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://maps.googleapis.com https://cdnjs.cloudflare.com https://duoggvkkvyvicpfoawuv.supabase.co;
    style-src 'self' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src * data: https://maps.googleapis.com https://maps.gstatic.com;
    connect-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
    frame-src 'none';
    object-src 'none';
    base-uri 'self';
  ">
</head>
<body>

<!-- PERMANENT WATERMARK -->
<div class="permanent-watermark"></div>

<header class="app-header">
  <div class="header-inner">
    <div class="logo-block">
      <span class="logo-flag">🇬🇩</span>
      <div>
        <h1 class="logo-title">DAC</h1>
        <p class="logo-sub">Digital Address Codes</p>
      </div>
    </div>
    <div class="header-badge">SECURE v4.0</div>
  </div>
</header>

<main class="app-main">
  <section class="map-panel">
    <div class="map-instruction">
      <span class="pulse-dot"></span>
      Click anywhere on the map to generate a DAC code
    </div>
    <div id="map"></div>

    <div class="sv-panel" id="sv-panel">
      <div class="sv-label">
        <span class="sv-icon">🚶</span>
        Street View
        <span class="sv-status" id="sv-status">— pin a location</span>
      </div>
      <div id="street-view"></div>
    </div>
  </section>

  <aside class="info-panel">
    <div class="card action-card">
      <div class="search-row">
        <input id="code-search" type="text" placeholder="Enter DAC Code (GD-STG-XXXXXX)" />
        <button class="btn btn-secondary" id="btn-search">Search</button>
      </div>
    </div>

    <div class="card code-card">
      <div class="location-code" id="location-code">GD-???-??????</div>
      <div class="coord-display" id="coord-display">Click the map to begin</div>
      <div class="parish-display" id="parish-display"></div>
    </div>

    <div class="card action-card">
      <button class="btn btn-layout" id="btn-layout" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor"/></svg>
        Generate Property Layout
      </button>
      <button class="btn btn-primary" id="btn-print" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18"><polyline points="6 9 6 2 18 2 18 9" fill="none" stroke="currentColor"/><rect x="4" y="9" width="16" height="12" rx="2" fill="none" stroke="currentColor"/></svg>
        Print Sticker - $3
      </button>
      <button class="btn btn-secondary" id="btn-download" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download QR
      </button>
      <button class="btn btn-secondary" id="btn-share" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="18" cy="5" r="3" fill="none" stroke="currentColor"/><circle cx="6" cy="12" r="3" fill="none" stroke="currentColor"/><circle cx="18" cy="19" r="3" fill="none" stroke="currentColor"/></svg>
        Share Location
      </button>
    </div>

    <div class="card qr-card">
      <div class="qr-placeholder" id="qr-placeholder">
        <svg viewBox="0 0 100 100" width="80" height="80"><rect x="10" y="10" width="35" height="35" rx="4" fill="none" stroke="currentColor"/><rect x="55" y="10" width="35" height="35" rx="4" fill="none" stroke="currentColor"/><rect x="10" y="55" width="35" height="35" rx="4" fill="none" stroke="currentColor"/></svg>
        <p>QR code will appear here</p>
      </div>
      <div id="qr-container" style="display:none;"></div>
    </div>
  </aside>
</main>

<footer class="app-footer">
  <p>DAC – Digital Address Codes · <a href="mailto:dac.grenada@gmail.com">dac.grenada@gmail.com</a></p>
  <p class="footer-tech">🔒 Secure payment processing by Stripe</p>
</footer>

<div class="toast" id="toast"></div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBJfcDVXsepgm5a9qGt2bfaRFtOKOfo-sw&callback=initMap&loading=async" async defer></script>
<script src="script.js"></script>

</body>
</html>
