<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful - DAC</title>
  
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
    style-src 'self' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    connect-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
  ">
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --navy:#0c1220; --navy-2:#141e30; --seafoam:#3abf9e; --saffron:#f0a500; --dim:#7a92b4; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--navy);
      color: #e8eef6;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--navy-2);
      border: 2px solid var(--seafoam);
      border-radius: 14px;
      max-width: 500px;
      width: 100%;
      padding: 40px 30px;
      text-align: center;
    }
    h1 { font-family: 'Syne', sans-serif; color: var(--seafoam); margin-bottom: 20px; }
    .status {
      font-family: 'IBM Plex Mono', monospace;
      padding: 15px;
      background: rgba(240,165,0,0.1);
      border-radius: 8px;
      margin: 20px 0;
    }
    .loader {
      width: 40px; height: 40px;
      border: 3px solid #1e2d44;
      border-top-color: var(--saffron);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .code-display {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      color: var(--saffron);
      padding: 10px;
      background: #0c1220;
      border-radius: 6px;
      margin: 15px 0;
    }
    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: var(--seafoam);
      color: #0c1220;
      border-radius: 6px;
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      margin-top: 20px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ PAYMENT RECEIVED</h1>
    <div class="loader" id="loader"></div>
    <div class="status" id="status">Verifying your payment...</div>
    <div id="success-container" class="hidden">
      <div class="code-display" id="dac-code"></div>
      <a href="#" id="continue-btn" class="btn">Continue →</a>
    </div>
  </div>

  <script>
  (function() {
    'use strict';
    
    const SUPABASE_URL = 'https://duoggvkkvyvicpfoawuv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1b2dndmtrdnl2aWNwZm9hd3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDczODAsImV4cCI6MjA4ODIyMzM4MH0.7dnVEQqH0LU_qOVeM2q7wE1gL14frD-s981vw0QpBZU';
    
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id');
    const dacCode = urlParams.get('code');
    const product = urlParams.get('product') || 'sticker';
    
    if (!dacCode) {
      document.getElementById('status').textContent = '❌ No DAC code found';
      return;
    }
    
    document.getElementById('dac-code').textContent = dacCode;
    
    let attempts = 0;
    const maxAttempts = 20;
    
    function pollForToken() {
      attempts++;
      document.getElementById('status').textContent = `🔍 Checking payment... (${attempts}/${maxAttempts})`;
      
      fetch(`${SUPABASE_URL}/rest/v1/rpc/get_payment_token`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ p_dac_code: dacCode, p_product: product })
      })
      .then(r => r.json())
      .then(data => {
        if (data.token) {
          document.getElementById('loader').classList.add('hidden');
          document.getElementById('status').classList.add('hidden');
          document.getElementById('success-container').classList.remove('hidden');
          
          const continueBtn = document.getElementById('continue-btn');
          continueBtn.href = `${product}.html?token=${data.token}`;
          
          sessionStorage.removeItem('dac_pending_code');
        } else if (attempts < maxAttempts) {
          setTimeout(pollForToken, 2000);
        } else {
          document.getElementById('status').textContent = '⚠️ Payment received but token generation delayed. Check your email.';
        }
      })
      .catch(() => {
        if (attempts < maxAttempts) {
          setTimeout(pollForToken, 2000);
        } else {
          document.getElementById('status').textContent = '❌ Network error. Please contact support.';
        }
      });
    }
    
    pollForToken();
  })();
  </script>
</body>
</html>
