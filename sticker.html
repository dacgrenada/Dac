<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAC Sticker - Secure</title>
  
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
    style-src 'self' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src * data:;
    connect-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
  ">
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c1220;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px;
      gap: 20px;
      position: relative;
    }
    
    /* PERMANENT WATERMARK */
    body::before {
      content: "🔒 DAC SECURE · " attr(data-timestamp);
      position: fixed;
      bottom: 5px;
      left: 5px;
      font-size: 9px;
      color: rgba(240,165,0,0.3);
      font-family: monospace;
      pointer-events: none;
      z-index: 999999;
    }
    
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(240,165,0,0.02) 50px, rgba(240,165,0,0.02) 100px);
      pointer-events: none;
      z-index: 999998;
    }
    
    .sticker-wrap {
      position: relative;
      background: #ffffff;
      border: 3px solid #f0a500;
      border-radius: 14px;
      padding: 28px 24px 20px;
      text-align: center;
      width: 100%; max-width: 320px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      z-index: 1;
    }
    .sticker-flag { font-size: 2.8rem; }
    .sticker-logo { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: #0c1220; }
    .sticker-code { font-family: 'IBM Plex Mono', monospace; font-size: 1.35rem; font-weight: 700; color: #c87700; margin: 14px 0; }
    .sticker-qr { width: 160px; height: 160px; margin: 0 auto; display: block; border: 2px solid #f0a500; border-radius: 8px; padding: 6px; background: #fff; }
    .sticker-coords { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: #555; }
    .sticker-date { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: #aaa; margin-top: 8px; }
    
    .pay-bar { width: 100%; max-width: 320px; }
    .btn-pay {
      width: 100%; padding: 13px 20px;
      background: linear-gradient(135deg,#2a1a3a,#1e2d44);
      color: #c09af0; border: 2px solid #9b72e8; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer;
    }
    
    .waiting-bar, .verifying-bar, .unlocked-bar {
      display: none; width: 100%; max-width: 320px;
      padding: 14px; border-radius: 8px;
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      text-align: center;
    }
    .waiting-bar { background: rgba(240,165,0,0.08); border: 1px solid rgba(240,165,0,0.3); color: #f0a500; }
    .verifying-bar { background: rgba(240,165,0,0.08); border: 1px solid rgba(240,165,0,0.3); color: #f0a500; }
    .unlocked-bar { background: rgba(58,191,158,0.12); border: 2px solid #3abf9e; color: #3abf9e; }
    .btn-print-now {
      padding: 10px 28px; background: #3abf9e; color: #0c1220;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-weight: 700; margin-top: 10px;
    }
    
    .error-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 1rem;
      color: #e85d3a; text-align: center;
    }
  </style>
</head>
<body data-timestamp="">

<div id="error-screen" class="error-screen" style="display:none;">
  <h2>⚠ No sticker data found</h2>
  <p>Please return to the map and click "Print Sticker" again.</p>
  <a href="index.html">← Back to map</a>
</div>

<div id="sticker-root" style="display:none;">
  <div class="sticker-wrap">
    <div class="sticker-flag">🇬🇩</div>
    <div class="sticker-logo">DAC</div>
    <div class="sticker-sub">Digital Address Codes</div>
    <div class="sticker-code" id="stk-code">—</div>
    <div id="stk-qr-holder" class="sticker-qr"></div>
    <div class="sticker-coords" id="stk-coords"></div>
    <div class="sticker-date" id="stk-date"></div>
  </div>

  <div class="pay-bar" id="pay-bar">
    <button class="btn-pay" id="btn-sticker-pay" onclick="startPayment()">💳 Pay $3 to Print</button>
    <div class="waiting-bar" id="sticker-waiting">⏳ Waiting for payment...</div>
  </div>

  <div class="verifying-bar" id="verifying-bar">🔐 Verifying...</div>

  <div class="unlocked-bar" id="sticker-unlocked">
    <div>✅ Unlocked!</div>
    <button class="btn-print-now" onclick="securePrint()">🖨 Print Sticker</button>
  </div>
</div>

<script>
(function() {
  'use strict';
  
  document.body.setAttribute('data-timestamp', new Date().toISOString());
  
  const SUPABASE_URL = 'https://duoggvkkvyvicpfoawuv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1b2dndmtrdnl2aWNwZm9hd3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDczODAsImV4cCI6MjA4ODIyMzM4MH0.7dnVEQqH0LU_qOVeM2q7wE1gL14frD-s981vw0QpBZU';
  const STRIPE_LINK = 'https://buy.stripe.com/8x26oB05y81Z4cL7cR5wI04';
  
  const urlParams = new URLSearchParams(window.location.search);
  const sessionToken = urlParams.get('session');
  const urlToken = urlParams.get('token');
  
  let stickerData = null;
  try {
    const raw = localStorage.getItem('dac_sticker_data');
    if (raw) stickerData = JSON.parse(raw);
  } catch (e) {}
  
  if (!stickerData && !sessionToken && !urlToken) {
    document.getElementById('error-screen').style.display = 'flex';
    return;
  }
  
  document.getElementById('sticker-root').style.display = 'contents';
  
  if (stickerData) {
    document.title = 'DAC Sticker - ' + stickerData.code;
    document.getElementById('stk-code').textContent = stickerData.code;
    document.getElementById('stk-coords').textContent = stickerData.lat + ', ' + stickerData.lng;
    document.getElementById('stk-date').textContent = 'Generated ' + stickerData.dateStr;
    
    const qrHolder = document.getElementById('stk-qr-holder');
    if (stickerData.qrUrl) {
      const qrImg = document.createElement('img');
      qrImg.src = stickerData.qrUrl;
      qrImg.className = 'sticker-qr';
      qrHolder.innerHTML = '';
      qrHolder.appendChild(qrImg);
    }
  }
  
  if (sessionToken) {
    document.getElementById('pay-bar').style.display = 'none';
    document.getElementById('verifying-bar').style.display = 'block';
    document.getElementById('verifying-bar').textContent = '🔐 Validating session...';
    
    fetch(`${SUPABASE_URL}/rest/v1/rpc/verify_session`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ p_session_token: sessionToken })
    })
    .then(r => r.json())
    .then(data => {
      if (data.valid) {
        document.getElementById('verifying-bar').style.display = 'none';
        document.getElementById('sticker-unlocked').style.display = 'block';
        sessionStorage.setItem('dac_unlocked', 'true');
      } else {
        document.getElementById('verifying-bar').textContent = '❌ Session expired';
        setTimeout(() => {
          document.getElementById('verifying-bar').style.display = 'none';
          document.getElementById('pay-bar').style.display = 'flex';
        }, 2000);
      }
    });
    return;
  }
  
  if (urlToken) {
    document.getElementById('pay-bar').style.display = 'none';
    document.getElementById('verifying-bar').style.display = 'block';
    document.getElementById('verifying-bar').textContent = '🔐 Validating payment...';
    
    fetch(`${SUPABASE_URL}/functions/v1/stripe-webhook?validate=true`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ payment_token: urlToken, product: 'sticker' })
    })
    .then(r => r.json())
    .then(data => {
      if (data.valid && data.session_token) {
        window.location.href = `sticker.html?session=${data.session_token}`;
      } else {
        document.getElementById('verifying-bar').textContent = '❌ ' + (data.error || 'Invalid token');
        setTimeout(() => {
          document.getElementById('verifying-bar').style.display = 'none';
          document.getElementById('pay-bar').style.display = 'flex';
        }, 2000);
      }
    });
    return;
  }
  
  window.startPayment = function() {
    sessionStorage.setItem('dac_pending_code', stickerData.code);
    window.open(STRIPE_LINK + '?client_reference_id=' + encodeURIComponent(stickerData.code), '_blank');
    document.getElementById('btn-sticker-pay').style.display = 'none';
    document.getElementById('sticker-waiting').style.display = 'block';
  };
  
  window.securePrint = function() {
    if (sessionStorage.getItem('dac_unlocked') === 'true') {
      window.print();
    } else {
      alert('❌ Please complete payment first');
    }
  };
  
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
      if (sessionStorage.getItem('dac_unlocked') !== 'true') {
        e.preventDefault();
        alert('❌ Please complete payment to print');
      }
    }
  }, true);
})();
</script>
</body>
</html>
