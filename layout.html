<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAC Property Layout - Secure</title>
  
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
    style-src 'self' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src * data: https://maps.googleapis.com https://maps.gstatic.com;
    connect-src 'self' https://duoggvkkvyvicpfoawuv.supabase.co;
  ">
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c1220;
      color: #e8eef6;
      font-family: 'DM Sans', sans-serif;
      padding: 24px;
      min-height: 100vh;
      position: relative;
    }
    
    /* PERMANENT WATERMARK */
    body::before {
      content: "🔒 DAC SECURE LAYOUT · " attr(data-timestamp);
      position: fixed;
      bottom: 5px;
      left: 5px;
      font-size: 9px;
      color: rgba(240,165,0,0.3);
      font-family: monospace;
      pointer-events: none;
      z-index: 999999;
    }
    
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(240,165,0,0.02) 50px, rgba(240,165,0,0.02) 100px);
      pointer-events: none;
      z-index: 999998;
    }

    .layout-card {
      background: #141e30;
      border: 2px solid #f0a500;
      border-radius: 12px;
      overflow: hidden;
      max-width: 860px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .layout-header {
      background: #0c1220;
      border-bottom: 2px solid #f0a500;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .header-left .logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: #f0a500; }
    .header-right .code { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; color: #fff; }

    .satellite-wrap {
      position: relative; width: 100%;
      background: #1e2d44; min-height: 180px;
    }
    .satellite-wrap img { width: 100%; display: block; max-height: 320px; object-fit: cover; }
    .sat-label {
      position: absolute; top: 10px; left: 12px;
      background: rgba(12,18,32,0.82);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; color: #f0a500;
      padding: 3px 8px; border-radius: 4px;
    }

    .info-row { display: flex; border-top: 1px solid #243450; }
    .info-fields {
      flex: 1; padding: 18px 24px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .field-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #7a92b4; }
    .field-value { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #e8eef6; }
    .field-value.highlight { color: #f0a500; }

    .qr-panel {
      padding: 14px 20px; border-left: 1px solid #243450;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-width: 130px;
    }
    .qr-panel img {
      width: 100px; height: 100px;
      border: 3px solid #f0a500; border-radius: 6px;
      padding: 4px; background: #fff;
    }

    .layout-footer {
      background: #0c1220; border-top: 1px solid #243450;
      padding: 8px 24px;
      display: flex; justify-content: space-between;
    }

    .pay-bar, .verifying-bar, .paid-banner {
      max-width: 860px; margin: 18px auto 0;
      padding: 14px; border-radius: 8px;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
    }
    .pay-bar { background: rgba(155,114,232,0.1); border: 2px solid #9b72e8; }
    .verifying-bar { background: rgba(240,165,0,0.08); border: 1px solid rgba(240,165,0,0.3); color: #f0a500; display: none; }
    .paid-banner { background: rgba(58,191,158,0.12); border: 2px solid #3abf9e; color: #3abf9e; display: none; }
    
    .btn-pay, .btn-print {
      padding: 12px 24px;
      background: #9b72e8; color: #fff;
      border: none; border-radius: 8px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      cursor: pointer;
    }
    .btn-print { background: #3abf9e; margin-top: 10px; }
    
    .error-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; color: #e85d3a;
    }
  </style>
</head>
<body data-timestamp="">

<div id="error-screen" class="error-screen" style="display:none;">
  <h2>⚠ No layout data found</h2>
  <p>Please return to the map and click "Generate Property Layout" again.</p>
  <a href="index.html">← Back to map</a>
</div>

<div id="layout-root" style="display:none;">
  <div class="layout-card">
    <div class="layout-header">
      <div class="header-left"><span class="logo">DAC</span></div>
      <div class="header-right"><span class="code" id="hdr-code">—</span></div>
    </div>

    <div class="satellite-wrap">
      <img class="sat-img" id="sat-img" alt="Satellite view" style="display:none;"/>
      <div class="sat-label" id="sat-label">📡 SATELLITE VIEW</div>
    </div>

    <div class="info-row">
      <div class="info-fields">
        <div><div class="field-label">DAC Code</div><div class="field-value highlight" id="inf-code">—</div></div>
        <div><div class="field-label">Parish</div><div class="field-value" id="inf-region">—</div></div>
        <div><div class="field-label">Latitude</div><div class="field-value" id="inf-lat">—</div></div>
        <div><div class="field-label">Longitude</div><div class="field-value" id="inf-lng">—</div></div>
        <div><div class="field-label">Generated</div><div class="field-value" id="inf-date">—</div></div>
      </div>
      <div class="qr-panel">
        <div id="qr-holder">Loading QR…</div>
      </div>
    </div>

    <div class="layout-footer">
      <span>dacgrenada.github.io/Dac</span>
      <span id="inf-footer">—</span>
    </div>
  </div>

  <div class="pay-bar" id="pay-bar">
    <button class="btn-pay" onclick="startPayment()">💳 Pay $3 to Unlock</button>
  </div>

  <div class="verifying-bar" id="verifying-bar">🔐 Verifying...</div>

  <div class="paid-banner" id="paid-banner">
    <div>✅ Layout Unlocked!</div>
    <button class="btn-print" onclick="securePrint()">🖨 Print Layout</button>
  </div>
</div>

<script>
(function() {
  'use strict';
  
  document.body.setAttribute('data-timestamp', new Date().toISOString());
  
  const SUPABASE_URL = 'https://duoggvkkvyvicpfoawuv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1b2dndmtrdnl2aWNwZm9hd3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDczODAsImV4cCI6MjA4ODIyMzM4MH0.7dnVEQqH0LU_qOVeM2q7wE1gL14frD-s981vw0QpBZU';
  const STRIPE_LINK = 'https://buy.stripe.com/8x26oB05y81Z4cL7cR5wI04';
  
  const urlParams = new URLSearchParams(window.location.search);
  const sessionToken = urlParams.get('session');
  const urlToken = urlParams.get('token');
  
  let layoutData = null;
  try {
    const raw = localStorage.getItem('dac_layout_data');
    if (raw) layoutData = JSON.parse(raw);
  } catch (e) {}
  
  if (!layoutData && !sessionToken && !urlToken) {
    document.getElementById('error-screen').style.display = 'flex';
    return;
  }
  
  document.getElementById('layout-root').style.display = 'block';
  
  if (layoutData) {
    document.title = 'DAC Layout - ' + layoutData.code;
    document.getElementById('hdr-code').textContent = layoutData.code;
    document.getElementById('inf-code').textContent = layoutData.code;
    document.getElementById('inf-region').textContent = layoutData.regionName || '—';
    document.getElementById('inf-lat').textContent = layoutData.lat;
    document.getElementById('inf-lng').textContent = layoutData.lng;
    document.getElementById('inf-date').textContent = layoutData.dateStr;
    document.getElementById('inf-footer').textContent = layoutData.code;
    document.getElementById('sat-label').textContent = '📡 SATELLITE VIEW';
    
    if (layoutData.staticMapUrl) {
      document.getElementById('sat-img').src = layoutData.staticMapUrl;
      document.getElementById('sat-img').style.display = 'block';
    }
    
    const qrHolder = document.getElementById('qr-holder');
    if (layoutData.qrDataUrl) {
      const qrImg = document.createElement('img');
      qrImg.src = layoutData.qrDataUrl;
      qrHolder.innerHTML = '';
      qrHolder.appendChild(qrImg);
    }
  }
  
  if (sessionToken) {
    document.getElementById('pay-bar').style.display = 'none';
    document.getElementById('verifying-bar').style.display = 'block';
    document.getElementById('verifying-bar').textContent = '🔐 Validating session...';
    
    fetch(`${SUPABASE_URL}/rest/v1/rpc/verify_session`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ p_session_token: sessionToken })
    })
    .then(r => r.json())
    .then(data => {
      if (data.valid) {
        document.getElementById('verifying-bar').style.display = 'none';
        document.getElementById('paid-banner').style.display = 'block';
        sessionStorage.setItem('dac_layout_unlocked', 'true');
      } else {
        document.getElementById('verifying-bar').textContent = '❌ Session expired';
        setTimeout(() => {
          document.getElementById('verifying-bar').style.display = 'none';
          document.getElementById('pay-bar').style.display = 'block';
        }, 2000);
      }
    });
    return;
  }
  
  if (urlToken) {
    document.getElementById('pay-bar').style.display = 'none';
    document.getElementById('verifying-bar').style.display = 'block';
    document.getElementById('verifying-bar').textContent = '🔐 Validating payment...';
    
    fetch(`${SUPABASE_URL}/functions/v1/stripe-webhook?validate=true`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ payment_token: urlToken, product: 'layout' })
    })
    .then(r => r.json())
    .then(data => {
      if (data.valid && data.session_token) {
        window.location.href = `layout.html?session=${data.session_token}`;
      } else {
        document.getElementById('verifying-bar').textContent = '❌ ' + (data.error || 'Invalid token');
        setTimeout(() => {
          document.getElementById('verifying-bar').style.display = 'none';
          document.getElementById('pay-bar').style.display = 'block';
        }, 2000);
      }
    });
    return;
  }
  
  window.startPayment = function() {
    sessionStorage.setItem('dac_pending_layout', layoutData.code);
    window.open(STRIPE_LINK + '?client_reference_id=' + encodeURIComponent(layoutData.code), '_blank');
    document.getElementById('pay-bar').style.display = 'none';
    document.getElementById('verifying-bar').style.display = 'block';
    document.getElementById('verifying-bar').textContent = '⏳ Waiting for payment...';
  };
  
  window.securePrint = function() {
    if (sessionStorage.getItem('dac_layout_unlocked') === 'true') {
      window.print();
    } else {
      alert('❌ Please complete payment first');
    }
  };
  
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
      if (sessionStorage.getItem('dac_layout_unlocked') !== 'true') {
        e.preventDefault();
        alert('❌ Please complete payment to print');
      }
    }
  }, true);
})();
</script>
</body>
</html>
